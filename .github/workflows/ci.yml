name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install core deps (no native PDF libs in CI)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" httpx beautifulsoup4 lxml aiohttp \
            pydantic pydantic-settings jinja2 anthropic pytest pytest-asyncio
      - name: Run tests
        working-directory: backend
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install & build
        working-directory: frontend
        run: |
          npm install
          npm run build
