# Render blueprint — one-click backend deploy so the live site can run REAL audits.
# In Render: New → Blueprint → connect this repo. Then set ANTHROPIC_API_KEY (and optionally
# GOOGLE_PSI_API_KEY) in the dashboard. The Docker image includes WeasyPrint's native libs,
# so PDF export works too.
services:
  - type: web
    name: website-audit-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      # Allow the live GitHub Pages site to call this API (CORS).
      - key: CORS_ORIGINS
        value: https://aashishbharti04.github.io
      # Secrets — set these in the Render dashboard (sync:false keeps them out of git).
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_PSI_API_KEY
        sync: false
      - key: AI_MODEL
        value: claude-sonnet-4-6
